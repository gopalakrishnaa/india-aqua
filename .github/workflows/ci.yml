name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check src tests dashboard

      - name: Pytest
        run: uv run pytest
