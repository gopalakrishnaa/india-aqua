name: MPPCB rivers scrape

# See cron-scrape.yml: GitHub Actions' `schedule` trigger proved unreliable
# on this repo (didn't fire at all for the first 2+ hours after this
# workflow was added). An external cron pinger (cron-job.org) now owns the
# actual scheduling by calling the endpoint below directly; this workflow
# keeps workflow_dispatch only, for manual runs/testing.
on:
  workflow_dispatch:

concurrency:
  group: mppcb-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Trigger scrape
        run: |
          # Observed up to ~155s end to end: the WQI classification step is
          # one LLM call per station, and this hits it sequentially for all
          # 9 stations, same as cron-scrape.yml's CPCB job. Generous
          # headroom here since this workflow hasn't run on a real schedule
          # yet.
          curl -sS -f -X GET "https://indiaaqua-api.vercel.app/api/v1/internal/cron/scrape?source=mppcb_rivers" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300
