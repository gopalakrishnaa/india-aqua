name: CPCB realtime scrape

# GitHub Actions' `schedule` trigger is best-effort, not guaranteed: in
# practice it skipped or delayed the large majority of its */30 firings on
# this repo, leaving data hours stale. An external cron pinger
# (cron-job.org) now owns the actual scheduling by calling the endpoint
# below directly; this workflow keeps workflow_dispatch only, for manual
# runs/testing.
on:
  workflow_dispatch:

concurrency:
  group: cpcb-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger scrape
        run: |
          curl -sS -f -X GET "https://indiaaqua-api.vercel.app/api/v1/internal/cron/scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 120
